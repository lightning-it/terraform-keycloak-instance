# yamllint disable rule:truthy
---
name: Terraform Module CI & Semantic Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  terraform-module:
    name: Terraform module checks (Terraform ${{ matrix.terraform_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        terraform_version: ["1.6.6", "1.9.0"]

    defaults:
      run:
        shell: bash

    steps:
      # 1) Checkout the repository
      - name: Checkout
        uses: actions/checkout@v7

      # 2) Install Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: ${{ matrix.terraform_version }}

      # 3) Format check in the module root
      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      # 4) Init without backend (we are testing a module, no state)
      - name: Terraform init (module root)
        run: terraform init -backend=false

      # 5) Validate module configuration
      - name: Terraform validate (module root)
        run: terraform validate

      # 6) Validate test fixtures (smoke/advanced/empty)
      - name: Terraform validate (test fixtures)
        run: |
          for dir in tests/keycloak-smoke tests/keycloak-advanced tests/keycloak-empty; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

      # 7) TFLint across the repo
      - name: TFLint (via wunder-devtools-ee)
        run: bash scripts/wunder-devtools-ee.sh tflint --recursive

  # Real release job: only runs on push to main
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: terraform-module
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write       # required to create tags and releases
      issues: write         # optional, for release notes references
      pull-requests: write  # optional, for release notes references
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      # Checkout with full history for semantic-release
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # semantic-release needs full history

      # Setup Node for semantic-release
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'

      # Install Node dependencies from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Run semantic-release (real release)
      - name: Verify semantic-release notes generation
        run: npm run test:release-notes

      - name: Run semantic-release
        run: npx semantic-release

  # Dry-run job: checks semantic-release config on pull requests
  release_dry_run:
    name: Semantic Release (dry run)
    runs-on: ubuntu-latest
    needs: terraform-module
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      # Checkout with full history to let semantic-release inspect tags/commits
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Setup Node for semantic-release
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: 'npm'

      # Install Node dependencies from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Run semantic-release in dry-run mode (no tags, no releases, no commits)
      - name: Verify semantic-release notes generation
        run: npm run test:release-notes

      - name: Run semantic-release (dry run)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          dry_run_branch="release-dry-run-pr-${PR_NUMBER}"
          dry_run_log="${RUNNER_TEMP}/semantic-release-dry-run.log"
          repository_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          local_repository_url="file://${GITHUB_WORKSPACE}"
          git switch -C "${dry_run_branch}"
          git config --local \
            "url.${local_repository_url}.insteadOf" \
            "${repository_url}"
          semantic_release_status=0
          # env-ci trusts GITHUB_REF over the checked-out branch in Actions.
          # Point it at the synthetic branch instead of refs/pull/.../merge.
          GITHUB_REF="refs/heads/${dry_run_branch}" npx semantic-release \
            --dry-run \
            --no-ci \
            --branches "${dry_run_branch}" \
            --repository-url "${repository_url}" \
            --plugins \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            >"${dry_run_log}" 2>&1 || semantic_release_status=$?
          cat "${dry_run_log}"
          if [ "${semantic_release_status}" -ne 0 ]; then
            exit "${semantic_release_status}"
          fi
          if grep -Fq \
            "while semantic-release is configured to only publish from" \
            "${dry_run_log}"; then
            echo "semantic-release did not analyze the dry-run branch" >&2
            exit 1
          fi
          if grep -Fq "The next release version is" "${dry_run_log}" && \
            ! grep -Eq '^### ' "${dry_run_log}"; then
            echo "semantic-release generated no categorized notes" >&2
            exit 1
          fi
