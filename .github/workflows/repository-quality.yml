# yamllint disable rule:truthy
---
name: Repository Quality

on:
  push:
    branches: ["develop", "main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: repository / quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Run Lightning IT repository quality checks
        run: python3 scripts/lit-repository-quality.py

      - name: Install GitHub policy audit dependencies
        if: hashFiles('scripts/audit-github-release-model.py') != '' && (hashFiles('release-model/repositories.yml') != '' || hashFiles('shared-assets/release-model/repositories.yml') != '')
        run: python3 -m pip install pyyaml

      - name: Build desired GitHub policy evidence
        if: hashFiles('scripts/audit-github-release-model.py') != '' && (hashFiles('release-model/repositories.yml') != '' || hashFiles('shared-assets/release-model/repositories.yml') != '')
        run: python3 scripts/audit-github-release-model.py --output dist/github-release-model-audit.json

      - name: Upload desired GitHub policy evidence
        if: hashFiles('dist/github-release-model-audit.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-release-model-audit
          path: |
            dist/github-release-model-audit.json
            dist/github-release-model-audit.md
