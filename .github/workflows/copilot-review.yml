# Managed by lightning-it/shared-assets-lit.
# Do not edit downstream copies directly.
# yamllint disable rule:truthy rule:line-length
---
name: Copilot review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  current-revision-reviewed:
    name: Current revision reviewed
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Verify current Copilot review and resolved findings
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          owner="${REPOSITORY%%/*}"
          repository="${REPOSITORY#*/}"
          read -r -d '' query <<'GRAPHQL' || true
          query($owner: String!, $repository: String!, $number: Int!) {
            repository(owner: $owner, name: $repository) {
              pullRequest(number: $number) {
                headRefOid
                reviews(last: 100) {
                  nodes {
                    author { login }
                    commit { oid }
                    state
                    submittedAt
                  }
                }
                reviewThreads(first: 100) {
                  totalCount
                  nodes {
                    isResolved
                    comments(first: 1) {
                      nodes { author { login } }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL

          response=""
          for attempt in $(seq 1 40); do
            response="$(
              gh api graphql \
                -f query="${query}" \
                -F owner="${owner}" \
                -F repository="${repository}" \
                -F number="${PR_NUMBER}"
            )"

            head_sha="$(jq -r '.data.repository.pullRequest.headRefOid // empty' <<<"${response}")"
            if [ -z "${head_sha}" ]; then
              echo "Unable to determine the pull request head SHA." >&2
              exit 1
            fi

            current_reviews="$(
              jq --arg head "${head_sha}" '
                [
                  .data.repository.pullRequest.reviews.nodes[]
                  | select((.author.login // "") | startswith("copilot-pull-request-reviewer"))
                  | select(.state == "COMMENTED")
                  | select(.commit.oid == $head)
                ]
                | length
              ' <<<"${response}"
            )"
            if [ "${current_reviews}" -gt 0 ]; then
              break
            fi

            if [ "${attempt}" -eq 40 ]; then
              echo "GitHub Copilot has not completed a review of current head ${head_sha}." >&2
              exit 1
            fi

            echo "Waiting for GitHub Copilot to review current head ${head_sha} (attempt ${attempt}/40)."
            sleep 15
          done

          thread_total="$(jq -r '.data.repository.pullRequest.reviewThreads.totalCount' <<<"${response}")"
          if [ "${thread_total}" -gt 100 ]; then
            echo "The pull request has more than 100 review threads; fail-closed verification requires pagination." >&2
            exit 1
          fi

          unresolved_copilot_threads="$(
            jq '
              [
                .data.repository.pullRequest.reviewThreads.nodes[]
                | select(.isResolved == false)
                | select(
                    ((.comments.nodes[0].author.login // "")
                    | startswith("copilot-pull-request-reviewer"))
                  )
              ]
              | length
            ' <<<"${response}"
          )"
          if [ "${unresolved_copilot_threads}" -gt 0 ]; then
            echo "${unresolved_copilot_threads} unresolved GitHub Copilot review thread(s) remain." >&2
            exit 1
          fi

          echo "GitHub Copilot reviewed current head ${head_sha}; no unresolved Copilot findings remain."
