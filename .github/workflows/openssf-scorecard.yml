# Managed by lightning-it/shared-assets-lit; change the canonical source there.
# yamllint disable rule:truthy rule:line-length
---
name: OpenSSF Scorecard

on:
  schedule:
    - cron: "23 4 * * 2"
  workflow_dispatch:
  branch_protection_rule:

permissions:
  contents: read

jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out exact repository source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run immutable OpenSSF Scorecard analysis
        uses: docker://ghcr.io/ossf/scorecard-action:v2.4.3@sha256:2dd6a6d60100f78ef24e14a47941d0087a524b4d3642041558239b1c6097c941
        with:
          results_file: scorecard.sarif
          results_format: sarif
          repo_token: ${{ github.token }}
          publish_results: false
          file_mode: archive
          internal_publish_base_url: https://api.scorecard.dev
          internal_default_token: ${{ github.token }}

      - name: Retain Scorecard SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          if-no-files-found: error

  upload-sarif:
    name: Upload Scorecard SARIF
    runs-on: ubuntu-24.04
    needs: scorecard
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Download Scorecard SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scorecard-sarif
          path: .

      - name: Upload Scorecard SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        # Private repositories without GitHub Advanced Security still retain
        # the SARIF workflow-run artifact without failing the scan.
        continue-on-error: ${{ github.event.repository.visibility != 'public' }}
        with:
          sarif_file: scorecard.sarif
